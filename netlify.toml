# ─────────────────────────────────────────────
#  Netlify Configuration — hamzaka.me
#  Security headers applied to all pages
# ─────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]

    # Force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Clickjacking protection — only allow framing from same origin
    X-Frame-Options = "SAMEORIGIN"

    # Block XSS attempts in older browsers
    X-XSS-Protection = "1; mode=block"

    # Control what info is sent in Referer headers to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict powerful browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    # Content Security Policy
    # - Scripts: self + Google Analytics only
    # - Styles: self + inline (needed for Tailwind/Next.js)
    # - Images: self + any HTTPS (for future flexibility)
    # - Fonts: self only (all fonts are local)
    # - No iframes from external origins
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"

# ─────────────────────────────────────────────
#  Cache static assets aggressively
#  (JS/CSS filenames are content-hashed by Next.js)
# ─────────────────────────────────────────────

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

